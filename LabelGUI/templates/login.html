<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DroneAI Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<main class="container">
  <div class="card" style="max-width:560px; margin:48px auto;">
    <h1>DroneAI</h1>
    <p class="muted">Team login for shared labeling workflow.</p>

    {% if error %}
      <p style="color:#ef4444;"><b>{{ error }}</b></p>
    {% endif %}

    <form method="POST" action="/login">
      <label>Username</label>
      <input name="username" placeholder="Your name" required>

      <label>Password</label>
      <input name="password" type="password" placeholder="Shared team password" required>

      <label>Role</label>
      <select name="role">
        <option value="team_member">Team Member</option>
        <option value="leader">Leader</option>
      </select>

      <div class="actions actions--big">
        <button class="btn btn--primary" type="submit">Login</button>
      </div>
    </form>
  </div>
</main>
</body>
</html>
